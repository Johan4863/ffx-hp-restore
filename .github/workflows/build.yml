name: Build FFX HP Restore

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # pozwala uruchomic recznie przyciskiem

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Skonfiguruj CMake
        run: cmake -G "Visual Studio 17 2022" -A Win32 -B build .

      - name: Kompiluj
        run: cmake --build build --config Release

      - name: Uploaduj gotowy DLL
        uses: actions/upload-artifact@v4
        with:
          name: ffx_hp_restore
          path: build/Release/ffx_hp_restore.dll
          if-no-files-found: error
